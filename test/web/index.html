<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Title</title>
    <style>/*<![CDATA[*/
    form {
        display: grid;
        gap: min(1rem, 5%);
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
    }
    textarea {
        width: calc(100% - 1rem);
        height: 100%;
        border: 0;
        resize: vertical;
    }
    fieldset:last-of-type {
        grid-column: 2;
        grid-row: 1 / span 2;
    }
    /*]]>*/</style>
    <script async type="text/javascript" src="/lily/dist/liblily.js"></script>
</head>
<body>
<h1>lily-web</h1>
<form>
    <fieldset>
        <legend><label for="af">Assembly file</label></legend>
        <textarea id="af"></textarea>
    </fieldset>
    <fieldset>
        <legend><label for="ds">Description scheme</label></legend>
        <textarea id="ds"></textarea>
    </fieldset>
    <fieldset>
        <legend>Assembly result</legend>
        <div></div>
    </fieldset>
</form>
</body>
</html>
