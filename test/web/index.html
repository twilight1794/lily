<?xml version="1.0" encoding="utf-8" ?>
<!DOCTYPE html>
<html lang="en">
<head>
    <title>lily-web</title>
    <style>/*<![CDATA[*/
    form {
        display: grid;
        gap: min(1rem, 5%);
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr auto auto;
    }
    textarea {
        width: calc(100% - 1rem);
        height: 100%;
        border: 0;
        resize: vertical;
    }
    fieldset:nth-of-type(3) {
        grid-column: 1 / span 2;
    }
    #res {
        min-height: 1rem;
    }
    /*]]>*/</style>
    <script fetchpriority="high" type="text/javascript" src="/dist/liblily.js"></script>
    <script defer="defer" type="text/javascript" src="main.js"></script>
</head>
<body>
<h1>lily-web</h1>
<form>
    <fieldset>
        <legend><label for="af">Assembly file</label></legend>
        <textarea id="af" autocorrect="off" spellcheck="false" required="required"></textarea>
    </fieldset>
    <fieldset>
        <legend><label for="ds">Description scheme</label></legend>
        <textarea id="ds" autocorrect="off" spellcheck="false" required="required"></textarea>
    </fieldset>
    <fieldset>
        <legend>Assembly result</legend>
        <div id="res"></div>
    </fieldset>
    <button id="run">Assembly</button>
    <fieldset>
        <legend>Status</legend>
        <div id="est">Ready</div>
    </fieldset>
</form>
</body>
</html>
